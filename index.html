<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ocean Chronicle Counter</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#061018">

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      overflow:hidden;
      touch-action:none;
    }

    body{
      color:white;
      font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
      text-align:center;
      background:#061018;
    }

    .bgLayer{
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)),
        url("bg-siren.PNG");
      background-size:cover;
      background-repeat:no-repeat;
      background-position:center 18px;
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:
        calc(228px + env(safe-area-inset-top)) 16px
        calc(26px + env(safe-area-inset-bottom));
    }

    .panel{
      width:min(92vw, 420px);
      padding:0;
      background:transparent;
      border:none;
      box-shadow:none;
    }

    .block{
      background:rgba(3,16,27,.28);
      border:1px solid rgba(190,230,255,.12);
      border-radius:26px;
      padding:16px 14px 12px;
      margin-bottom:14px;
      backdrop-filter:blur(4px);
      box-shadow:
        0 10px 24px rgba(0,0,0,.16);
    }

    .label{
      font-size:12px;
      letter-spacing:.24em;
      font-weight:700;
      color:rgba(255,255,255,.94);
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
    }

    .value{
      min-width:88px;
      font-size:70px;
      font-weight:800;
      line-height:1;
      color:#f4fbff;
      text-shadow:0 8px 22px rgba(0,0,0,.30);
    }

    .btn{
      width:82px;
      height:82px;
      border:none;
      border-radius:20px;
      font-size:42px;
      font-weight:700;
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6d96bd 0%, #467aa7 42%, #2c5f87 100%);
      box-shadow:
        0 10px 20px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .btn:active{
      transform:scale(.98);
      box-shadow:
        0 7px 14px rgba(0,0,0,.16),
        inset 0 2px 6px rgba(0,0,0,.14);
    }

    .hint{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.64);
      letter-spacing:.06em;
    }

    .footerButtons{
      display:flex;
      gap:10px;
      margin-top:4px;
    }

    .reset,
    .bgSwitch,
    .musicBtn{
      border:none;
      border-radius:18px;
      font-weight:800;
      box-shadow:
        0 10px 20px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.16);
    }

    .reset,
    .bgSwitch{
      flex:1;
      height:58px;
      font-size:18px;
      letter-spacing:.10em;
    }

    .musicBtn{
      width:58px;
      height:58px;
      flex:0 0 58px;
      font-size:24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .reset{
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #d9ba5b 0%, #c79f39 44%, #976f1c 100%);
    }

    .bgSwitch{
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #4f6b86 0%, #334b61 44%, #22384c 100%);
    }

    .musicBtn{
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #5d7391 0%, #415771 44%, #2a3d52 100%);
    }

    .musicBtn.on{
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6ea8d1 0%, #4a7ead 44%, #2f5f86 100%);
    }

    .reset:active,
    .bgSwitch:active,
    .musicBtn:active{
      transform:scale(.99);
    }

    .dragHint{
      position:fixed;
      top:calc(8px + env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      z-index:1;
      padding:6px 12px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.08em;
      color:rgba(255,255,255,.82);
      background:rgba(3,16,27,.24);
      border:1px solid rgba(190,230,255,.10);
      backdrop-filter:blur(4px);
      pointer-events:none;
    }

    @media (max-width: 430px){
      .wrap{
        padding:
          calc(220px + env(safe-area-inset-top)) 14px
          calc(24px + env(safe-area-inset-bottom));
      }

      .btn{
        width:74px;
        height:74px;
        font-size:38px;
      }

      .value{
        min-width:80px;
        font-size:64px;
      }

      .block{
        border-radius:22px;
        padding:14px 12px 12px;
        margin-bottom:12px;
      }

      .footerButtons{
        gap:8px;
      }

      .reset,
      .bgSwitch{
        height:54px;
        font-size:16px;
        border-radius:16px;
      }

      .musicBtn{
        width:54px;
        height:54px;
        flex:0 0 54px;
        font-size:22px;
        border-radius:16px;
      }
    }
  </style>
</head>

<body>
  <div class="bgLayer" id="bgLayer"></div>
  <div class="dragHint">背景は上側をスワイプで移動</div>

  <div class="wrap">
    <div class="panel" id="panel">

      <div class="block">
        <div class="label">LIFE</div>
        <div class="row">
          <button class="btn" type="button" onclick="lifeMinus()">−</button>
          <div class="value" id="life">10</div>
          <button class="btn" type="button" onclick="lifePlus()">＋</button>
        </div>
        <div class="hint">範囲 0〜10</div>
      </div>

      <div class="block">
        <div class="label">DEPTH</div>
        <div class="row">
          <button class="btn" type="button" onclick="depthMinus()">−</button>
          <div class="value" id="depth">1</div>
          <button class="btn" type="button" onclick="depthPlus()">＋</button>
        </div>
        <div class="hint">範囲 1〜4</div>
      </div>

      <div class="footerButtons">
        <button class="reset" type="button" onclick="reset()">RESET</button>
        <button class="bgSwitch" id="bgToggleBtn" type="button">背景切り替え</button>
        <button class="musicBtn" id="musicBtn" type="button" aria-label="BGM切り替え">🎵</button>
      </div>

    </div>
  </div>

  <script>
    // -----------------------------
    // SFX
    // -----------------------------
    const SFX_ENABLED_KEY = "kaiyouki_sfx_enabled";
    if (localStorage.getItem(SFX_ENABLED_KEY) === null) {
      localStorage.setItem(SFX_ENABLED_KEY, "true");
    }

    const sfxTap = new Audio("tap.mp3");
    const sfxDepth = new Audio("depth.mp3");
    sfxTap.preload = "auto";
    sfxDepth.preload = "auto";

    function sfxEnabled(){
      return localStorage.getItem(SFX_ENABLED_KEY) === "true";
    }

    async function playSfx(audioObj){
      if (!sfxEnabled()) return;
      try{
        audioObj.currentTime = 0;
        await audioObj.play();
      } catch(e){}
    }

    // -----------------------------
    // Counter state
    // -----------------------------
    let life = Number(localStorage.getItem("kaiyouki_life") ?? 10);
    let depth = Number(localStorage.getItem("kaiyouki_depth") ?? 1);

    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

    function update(){
      life = clamp(life, 0, 10);
      depth = clamp(depth, 1, 4);

      document.getElementById("life").innerText = life;
      document.getElementById("depth").innerText = depth;

      localStorage.setItem("kaiyouki_life", life);
      localStorage.setItem("kaiyouki_depth", depth);
    }

    async function lifePlus(){ life++; update(); await playSfx(sfxTap); }
    async function lifeMinus(){ life--; update(); await playSfx(sfxTap); }
    async function depthPlus(){ depth++; update(); await playSfx(sfxDepth); }
    async function depthMinus(){ depth--; update(); await playSfx(sfxDepth); }

    async function reset(){
      life = 10;
      depth = 1;
      update();
      await playSfx(sfxTap);
    }

    update();

    // -----------------------------
    // Background config
    // -----------------------------
    const BG_KEY = "kaiyouki_bg";

    const BG_LIST = [
      { id: "siren", file: "bg-siren.PNG", music: "bgm-siren.mp3", defaultOffset: 18 },
      { id: "leviathan", file: "bg-leviathan.PNG", music: "bgm-leviathan.mp3", defaultOffset: 18 }
    ];

    function getCurrentBgId(){
      return localStorage.getItem(BG_KEY) || "siren";
    }

    function getBackgroundConfig(bgId){
      return BG_LIST.find(item => item.id === bgId) || BG_LIST[0];
    }

    function getBgOffsetKey(bgId){
      return `kaiyouki_bg_offset_${bgId}`;
    }

    function getSavedOffset(bgId){
      const bg = getBackgroundConfig(bgId);
      const saved = localStorage.getItem(getBgOffsetKey(bgId));
      return saved !== null ? Number(saved) : bg.defaultOffset;
    }

    function setSavedOffset(bgId, offset){
      localStorage.setItem(getBgOffsetKey(bgId), String(offset));
    }

    function applyBackground(bgId){
      const bg = getBackgroundConfig(bgId);
      const offset = getSavedOffset(bgId);
      const bgLayer = document.getElementById("bgLayer");

      bgLayer.style.backgroundImage =
        `linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)), url("${bg.file}")`;
      bgLayer.style.backgroundPosition = `center ${offset}px`;

      localStorage.setItem(BG_KEY, bg.id);

      if (isMusicEnabled()) {
        switchMusicForBackground(bg);
      }
    }

    async function toggleBackground(){
      const current = getCurrentBgId();
      const currentIndex = BG_LIST.findIndex(item => item.id === current);
      const nextIndex = (currentIndex + 1) % BG_LIST.length;
      applyBackground(BG_LIST[nextIndex].id);
      await playSfx(sfxTap);
    }

    document.getElementById("bgToggleBtn").addEventListener("click", toggleBackground);

    // -----------------------------
    // Background drag / swipe
    // -----------------------------
    let dragStartY = null;
    let dragStartOffset = null;
    let dragging = false;

    function panelTop(){
      return document.getElementById("panel").getBoundingClientRect().top;
    }

    function canStartDrag(clientY, target){
      if (target.closest("button")) return false;
      return clientY < panelTop() - 8;
    }

    function startDrag(clientY){
      const bgId = getCurrentBgId();
      dragStartY = clientY;
      dragStartOffset = getSavedOffset(bgId);
      dragging = true;
    }

    function moveDrag(clientY){
      if (!dragging) return;
      const bgId = getCurrentBgId();
      const delta = clientY - dragStartY;
      const nextOffset = dragStartOffset + delta;
      setSavedOffset(bgId, nextOffset);
      applyBackground(bgId);
    }

    function endDrag(){
      dragging = false;
      dragStartY = null;
      dragStartOffset = null;
    }

    document.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      if (canStartDrag(t.clientY, e.target)) {
        startDrag(t.clientY);
      }
    }, { passive:true });

    document.addEventListener("touchmove", (e) => {
      if (!dragging) return;
      const t = e.touches[0];
      moveDrag(t.clientY);
      e.preventDefault();
    }, { passive:false });

    document.addEventListener("touchend", () => {
      endDrag();
    }, { passive:true });

    // -----------------------------
    // Music
    // -----------------------------
    const MUSIC_KEY = "kaiyouki_music_enabled";
    const audio = new Audio();
    audio.loop = true;
    audio.preload = "auto";

    function isMusicEnabled(){
      return localStorage.getItem(MUSIC_KEY) === "true";
    }

    function updateMusicButton(){
      const btn = document.getElementById("musicBtn");
      if (isMusicEnabled()) btn.classList.add("on");
      else btn.classList.remove("on");
    }

    async function switchMusicForBackground(bg){
      try{
        const nextSrc = bg.music;
        if (!audio.src.endsWith(nextSrc)) {
          audio.src = nextSrc;
        }
        audio.currentTime = 0;
        await audio.play();
      } catch (e) {
        localStorage.setItem(MUSIC_KEY, "false");
        updateMusicButton();
      }
    }

    async function toggleMusic(){
      if (isMusicEnabled()) {
        localStorage.setItem(MUSIC_KEY, "false");
        audio.pause();
      } else {
        localStorage.setItem(MUSIC_KEY, "true");
        await switchMusicForBackground(getBackgroundConfig(getCurrentBgId()));
      }
      updateMusicButton();
      await playSfx(sfxTap);
    }

    document.getElementById("musicBtn").addEventListener("click", toggleMusic);

    // -----------------------------
    // Init
    // -----------------------------
    applyBackground(getCurrentBgId());
    updateMusicButton();
  </script>
</body>
</html>
