<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ocean Chronicle Counter</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#061018">

  <style>
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ margin:0; min-height:100%; overflow:hidden; touch-action:none; }
    body{ color:white; font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; text-align:center; background:#061018; }

    .bgLayer{
      position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)), url("bg-siren.PNG");
      background-size:cover; background-repeat:no-repeat; background-position:center 18px;
    }

    .logoTapZone{
      position:fixed; top:0; left:0; right:0; height:160px;
      z-index:2; background:transparent;
    }

    .toast{
      position:fixed;
      top:calc(12px + env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.10em;
      color:rgba(255,255,255,.92);
      background:rgba(3,16,27,.32);
      border:1px solid rgba(190,230,255,.12);
      backdrop-filter:blur(4px);
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease;
    }
    .toast.show{ opacity:1; }

    .wrap{
      position:relative; z-index:1;
      min-height:100vh; display:flex; align-items:flex-end; justify-content:center;
      padding: calc(228px + env(safe-area-inset-top)) 16px calc(26px + env(safe-area-inset-bottom));
    }

    .panel{ width:min(92vw, 420px); padding:0; background:transparent; border:none; box-shadow:none; }

    .block{
      background:rgba(3,16,27,.28);
      border:1px solid rgba(190,230,255,.12);
      border-radius:26px;
      padding:16px 14px 12px;
      margin-bottom:14px;
      backdrop-filter:blur(4px);
      box-shadow: 0 10px 24px rgba(0,0,0,.16);
    }

    .label{ font-size:12px; letter-spacing:.24em; font-weight:700; color:rgba(255,255,255,.94); margin-bottom:12px; }
    .row{ display:flex; align-items:center; justify-content:center; gap:16px; }
    .value{ min-width:88px; font-size:70px; font-weight:800; line-height:1; color:#f4fbff; text-shadow:0 8px 22px rgba(0,0,0,.30); }

    .btn{
      width:82px; height:82px; border:none; border-radius:20px;
      font-size:42px; font-weight:700; color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6d96bd 0%, #467aa7 42%, #2c5f87 100%);
      box-shadow: 0 10px 20px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .btn:active{ transform:scale(.98); box-shadow: 0 7px 14px rgba(0,0,0,.16), inset 0 2px 6px rgba(0,0,0,.14); }

    .hint{ margin-top:10px; font-size:12px; color:rgba(255,255,255,.64); letter-spacing:.06em; }

    .footerButtons{ display:flex; gap:10px; margin-top:4px; }

    .reset,.bgSwitch,.musicBtn{
      border:none; border-radius:18px; font-weight:800;
      box-shadow: 0 10px 20px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.16);
    }
    .reset,.bgSwitch{ flex:1; height:58px; font-size:18px; letter-spacing:.10em; }
    .musicBtn{ width:58px; height:58px; flex:0 0 58px; font-size:24px; display:flex; align-items:center; justify-content:center; }

    .reset{
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #d9ba5b 0%, #c79f39 44%, #976f1c 100%);
    }
    .bgSwitch{
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #4f6b86 0%, #334b61 44%, #22384c 100%);
    }
    .musicBtn{
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #5d7391 0%, #415771 44%, #2a3d52 100%);
    }
    .musicBtn.on{
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6ea8d1 0%, #4a7ead 44%, #2f5f86 100%);
    }
    .musicBtn.secret{
      outline:2px solid rgba(217,194,122,.55);
      box-shadow: 0 10px 20px rgba(0,0,0,.20), 0 0 18px rgba(217,194,122,.18), inset 0 1px 0 rgba(255,255,255,.16);
    }

    @media (max-width: 430px){
      .wrap{ padding: calc(220px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom)); }
      .btn{ width:74px; height:74px; font-size:38px; }
      .value{ min-width:80px; font-size:64px; }
      .block{ border-radius:22px; padding:14px 12px 12px; margin-bottom:12px; }
      .footerButtons{ gap:8px; }
      .reset,.bgSwitch{ height:54px; font-size:16px; border-radius:16px; }
      .musicBtn{ width:54px; height:54px; flex:0 0 54px; font-size:22px; border-radius:16px; }
      .logoTapZone{ height:150px; }
    }
  </style>
</head>

<body>
  <div class="bgLayer" id="bgLayer"></div>
  <div class="logoTapZone" id="logoTapZone"></div>
  <div class="toast" id="toast">SECRET</div>

  <div class="wrap">
    <div class="panel">
      <div class="block">
        <div class="label">LIFE</div>
        <div class="row">
          <button class="btn" type="button" onclick="lifeMinus()">−</button>
          <div class="value" id="life">10</div>
          <button class="btn" type="button" onclick="lifePlus()">＋</button>
        </div>
        <div class="hint">範囲 0〜10</div>
      </div>

      <div class="block">
        <div class="label">DEPTH</div>
        <div class="row">
          <button class="btn" type="button" onclick="depthMinus()">−</button>
          <div class="value" id="depth">1</div>
          <button class="btn" type="button" onclick="depthPlus()">＋</button>
        </div>
        <div class="hint">範囲 1〜4</div>
      </div>

      <div class="footerButtons">
        <button class="reset" type="button" onclick="reset()">RESET</button>
        <button class="bgSwitch" id="bgToggleBtn" type="button">背景切り替え</button>
        <button class="musicBtn" id="musicBtn" type="button" aria-label="BGM">🎵</button>
      </div>
    </div>
  </div>

  <script>
    // -------- Keys
    const BG_KEY = "kaiyouki_bg";
    const MUSIC_KEY = "kaiyouki_music_enabled";
    const SECRET_UNLOCKED_KEY = "kaiyouki_secret_unlocked";
    const SECRET_ENABLED_KEY = "kaiyouki_secret_enabled";

    // -------- Utils
    const clamp = (v,min,max)=> Math.min(max, Math.max(min, v));
    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"), 1200);
    }

    // -------- SFX
    const sfxTap = new Audio("tap.mp3");
    const sfxDepth = new Audio("depth.mp3");
    async function playSfx(a){ try{ a.currentTime=0; await a.play(); }catch(e){} }

    // -------- Counters
    let life = Number(localStorage.getItem("kaiyouki_life") ?? 10);
    let depth = Number(localStorage.getItem("kaiyouki_depth") ?? 1);
    function updateCounters(){
      life = clamp(life,0,10); depth = clamp(depth,1,4);
      document.getElementById("life").innerText = life;
      document.getElementById("depth").innerText = depth;
      localStorage.setItem("kaiyouki_life", life);
      localStorage.setItem("kaiyouki_depth", depth);
    }
    async function lifePlus(){ life++; updateCounters(); await playSfx(sfxTap); }
    async function lifeMinus(){ life--; updateCounters(); await playSfx(sfxTap); }
    async function depthPlus(){ depth++; updateCounters(); await playSfx(sfxDepth); }
    async function depthMinus(){ depth--; updateCounters(); await playSfx(sfxDepth); }
    async function reset(){ life=10; depth=1; updateCounters(); await playSfx(sfxTap); }
    updateCounters();

    // -------- Background
    const BG_LIST = [
      { id:"siren", file:"bg-siren.PNG", music:"bgm-siren.mp3", offset:18 },
      { id:"leviathan", file:"bg-leviathan.PNG", music:"bgm-leviathan.mp3", offset:18 }
    ];
    const bgLayer = document.getElementById("bgLayer");
    function getBgId(){ return localStorage.getItem(BG_KEY) || "siren"; }
    function getBg(id){ return BG_LIST.find(b=>b.id===id) || BG_LIST[0]; }
    function applyBg(id){
      const bg = getBg(id);
      bgLayer.style.backgroundImage = `linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)), url("${bg.file}")`;
      bgLayer.style.backgroundPosition = `center ${bg.offset}px`;
      localStorage.setItem(BG_KEY, bg.id);
      if (isMusicOn()) switchMusic();
    }
    async function toggleBg(){
      const cur = getBgId();
      const idx = BG_LIST.findIndex(b=>b.id===cur);
      applyBg(BG_LIST[(idx+1)%BG_LIST.length].id);
      await playSfx(sfxTap);
    }
    document.getElementById("bgToggleBtn").addEventListener("click", toggleBg);

    // -------- Music
    const audio = new Audio();
    audio.loop = true;
    audio.preload = "auto";

    function isMusicOn(){ return localStorage.getItem(MUSIC_KEY)==="true"; }
    function isSecretUnlocked(){ return localStorage.getItem(SECRET_UNLOCKED_KEY)==="true"; }
    function isSecretEnabled(){ return localStorage.getItem(SECRET_ENABLED_KEY)==="true"; }

    function setSecretEnabled(v){
      localStorage.setItem(SECRET_ENABLED_KEY, v ? "true" : "false");
      updateMusicButton();
    }

    function updateMusicButton(){
      const btn = document.getElementById("musicBtn");
      if (isMusicOn()) btn.classList.add("on"); else btn.classList.remove("on");
      if (isSecretUnlocked() && isSecretEnabled()) btn.classList.add("secret"); else btn.classList.remove("secret");
    }

    async function playBgm(src){
      try{
        if (!audio.src.endsWith(src)) audio.src = src;
        audio.currentTime = 0;
        await audio.play();
      }catch(e){
        localStorage.setItem(MUSIC_KEY,"false");
        updateMusicButton();
      }
    }

    async function switchMusic(){
      const bg = getBg(getBgId());
      if (isSecretUnlocked() && isSecretEnabled()){
        await playBgm("bgm-secret.mp3");
      }else{
        await playBgm(bg.music);
      }
    }

    // 🎵 短押し：BGM ON/OFF
    async function toggleMusic(){
      if (isMusicOn()){
        localStorage.setItem(MUSIC_KEY,"false");
        audio.pause();
      }else{
        localStorage.setItem(MUSIC_KEY,"true");
        await switchMusic();
      }
      updateMusicButton();
      await playSfx(sfxTap);
    }

    // 🎵 長押し：SECRET ON/OFF（解放済みのみ）
    async function toggleSecretMode(){
      if (!isSecretUnlocked()){
        toast("NOT UNLOCKED");
        return;
      }
      setSecretEnabled(!isSecretEnabled());
      toast(isSecretEnabled() ? "SECRET ON" : "SECRET OFF");
      await playSfx(sfxTap);
      if (isMusicOn()){
        await switchMusic();
      }
    }

    // 長押し判定
    let pressTimer = null;
    const musicBtn = document.getElementById("musicBtn");

    musicBtn.addEventListener("touchstart", (e)=>{
      pressTimer = setTimeout(()=>{ toggleSecretMode(); }, 650);
    }, {passive:true});
    musicBtn.addEventListener("touchend", ()=>{
      if (pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
    }, {passive:true});
    musicBtn.addEventListener("click", ()=>{
      // 長押しが発火してたら click も来ることがあるので抑制
      if (pressTimer === null) return;
      clearTimeout(pressTimer); pressTimer=null;
      toggleMusic();
    });

    // -------- Secret unlock: logo 7 taps
    let tapCount=0, tapTimer=null;
    async function unlockSecret(){
      if (isSecretUnlocked()) return;
      localStorage.setItem(SECRET_UNLOCKED_KEY,"true");
      setSecretEnabled(false); // ✅ 解放しても自動でSECRET再生しない
      toast("SECRET UNLOCKED");
      await playSfx(sfxTap);
      updateMusicButton();
    }

    document.getElementById("logoTapZone").addEventListener("click", async ()=>{
      tapCount++;
      if (tapTimer) clearTimeout(tapTimer);
      tapTimer = setTimeout(()=>{ tapCount=0; }, 1200);
      if (tapCount>=7){
        tapCount=0;
        await unlockSecret();
      }
    });

    // Init
    if (localStorage.getItem(SECRET_ENABLED_KEY) === null) setSecretEnabled(false);
    applyBg(getBgId());
    updateMusicButton();
  </script>
</body>
</html>
