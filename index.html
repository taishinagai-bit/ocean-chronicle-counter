<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ocean Chronicle Counter</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      color:white;
      font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
      text-align:center;
      background:
        linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)),
        url("bg.png.PNG") center 18px / cover no-repeat fixed;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:
        calc(228px + env(safe-area-inset-top)) 16px
        calc(26px + env(safe-area-inset-bottom));
    }

    .panel{
      width:min(92vw, 420px);
      padding:0;
      background:transparent;
      border:none;
      box-shadow:none;
    }

    .block{
      background:rgba(3,16,27,.28);
      border:1px solid rgba(190,230,255,.12);
      border-radius:26px;
      padding:16px 14px 12px;
      margin-bottom:14px;
      backdrop-filter:blur(4px);
      box-shadow:
        0 10px 24px rgba(0,0,0,.16);
    }

    .label{
      font-size:12px;
      letter-spacing:.24em;
      font-weight:700;
      color:rgba(255,255,255,.94);
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
    }

    .value{
      min-width:88px;
      font-size:70px;
      font-weight:800;
      line-height:1;
      color:#f4fbff;
      text-shadow:0 8px 22px rgba(0,0,0,.30);
    }

    .btn{
      width:82px;
      height:82px;
      border:none;
      border-radius:20px;
      font-size:42px;
      font-weight:700;
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6d96bd 0%, #467aa7 42%, #2c5f87 100%);
      box-shadow:
        0 10px 20px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .btn:active{
      transform:scale(.98);
      box-shadow:
        0 7px 14px rgba(0,0,0,.16),
        inset 0 2px 6px rgba(0,0,0,.14);
    }

    .hint{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.64);
      letter-spacing:.06em;
    }

    .reset{
      width:100%;
      height:62px;
      border:none;
      border-radius:20px;
      margin-top:4px;
      font-size:20px;
      font-weight:800;
      letter-spacing:.18em;
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #d9ba5b 0%, #c79f39 44%, #976f1c 100%);
      box-shadow:
        0 12px 24px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .reset:active{
      transform:scale(.99);
    }

    @media (max-width: 430px){
      body{
        background:
          linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.22)),
          url("bg.png.PNG") center 12px / cover no-repeat fixed;
      }

      .wrap{
        padding:
          calc(220px + env(safe-area-inset-top)) 14px
          calc(24px + env(safe-area-inset-bottom));
      }

      .btn{
        width:74px;
        height:74px;
        font-size:38px;
      }

      .value{
        min-width:80px;
        font-size:64px;
      }

      .block{
        border-radius:22px;
        padding:14px 12px 12px;
        margin-bottom:12px;
      }

      .reset{
        height:60px;
        font-size:19px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">

      <div class="block">
        <div class="label">LIFE</div>
        <div class="row">
          <button class="btn" onclick="lifeMinus()">−</button>
          <div class="value" id="life">10</div>
          <button class="btn" onclick="lifePlus()">＋</button>
        </div>
        <div class="hint">範囲 0〜10</div>
      </div>

      <div class="block">
        <div class="label">DEPTH</div>
        <div class="row">
          <button class="btn" onclick="depthMinus()">−</button>
          <div class="value" id="depth">1</div>
          <button class="btn" onclick="depthPlus()">＋</button>
        </div>
        <div class="hint">範囲 1〜4</div>
      </div>

      <button class="reset" onclick="reset()">RESET</button>

    </div>
  </div>

  <script>
    let life = Number(localStorage.getItem("kaiyouki_life") ?? 10);
    let depth = Number(localStorage.getItem("kaiyouki_depth") ?? 1);

    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

    function update(){
      life = clamp(life, 0, 10);
      depth = clamp(depth, 1, 4);
      document.getElementById("life").innerText = life;
      document.getElementById("depth").innerText = depth;
      localStorage.setItem("kaiyouki_life", life);
      localStorage.setItem("kaiyouki_depth", depth);
    }

    function lifePlus(){
      life++;
      update();
    }

    function lifeMinus(){
      life--;
      update();
    }

    function depthPlus(){
      depth++;
      update();
    }

    function depthMinus(){
      depth--;
      update();
    }

    function reset(){
      life = 10;
      depth = 1;
      update();
    }

    update();
  </script>
</body>
</html>
