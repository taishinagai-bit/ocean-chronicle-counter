<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>海洋記 Counter</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html,body{
      min-height:100%;
      margin:0;
    }

    body{
      color:white;
      font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
      text-align:center;
      background:
        linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,.50)),
        url("bg.png") center top / cover no-repeat fixed;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:160px 16px 18px;
    }

    .panel{
      width:min(92vw, 420px);
      background:rgba(5,20,32,.72);
      border:1px solid rgba(180,230,255,.16);
      border-radius:28px;
      padding:22px 18px 20px;
      backdrop-filter:blur(4px);
      box-shadow:
        0 12px 40px rgba(0,0,0,.45),
        inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .block{
      background:rgba(1,14,24,.52);
      border:1px solid rgba(140,220,255,.10);
      border-radius:24px;
      padding:18px 12px 14px;
      margin-bottom:14px;
      box-shadow:
        inset 0 0 24px rgba(0,120,200,.08),
        0 8px 22px rgba(0,0,0,.18);
    }

    .label{
      font-size:13px;
      letter-spacing:.24em;
      font-weight:700;
      color:rgba(255,255,255,.88);
      margin-bottom:14px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .value{
      min-width:96px;
      font-size:76px;
      font-weight:800;
      line-height:1;
      color:#f4fbff;
      text-shadow:0 8px 24px rgba(0,0,0,.45);
    }

    .btn{
      width:88px;
      height:88px;
      border:none;
      border-radius:22px;
      font-size:44px;
      font-weight:700;
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #5f8eb8 0%, #3c78a8 38%, #245d88 100%);
      box-shadow:
        0 12px 26px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -3px 8px rgba(0,0,0,.18);
      position:relative;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset:6px;
      border-radius:18px;
      border:1px solid rgba(210,235,255,.14);
      pointer-events:none;
    }

    .btn:active{
      transform:scale(.98);
      box-shadow:
        0 8px 18px rgba(0,0,0,.28),
        inset 0 2px 6px rgba(0,0,0,.18);
    }

    .hint{
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,.56);
      letter-spacing:.06em;
    }

    .reset{
      width:100%;
      height:68px;
      border:none;
      border-radius:22px;
      margin-top:6px;
      font-size:22px;
      font-weight:800;
      letter-spacing:.18em;
      color:#fff8e8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #dbbd5b 0%, #c9a53f 42%, #9a741f 100%);
      box-shadow:
        0 14px 30px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.24),
        inset 0 -4px 10px rgba(90,55,0,.20);
      position:relative;
    }

    .reset::before{
      content:"";
      position:absolute;
      inset:7px;
      border-radius:16px;
      border:1px solid rgba(255,245,220,.16);
      pointer-events:none;
    }

    .reset:active{
      transform:scale(.99);
      box-shadow:
        0 10px 22px rgba(0,0,0,.32),
        inset 0 2px 6px rgba(80,45,0,.20);
    }

    @media (max-width: 430px){
      .wrap{
        padding:160px 14px 18px;
      }

      .panel{
        width:100%;
        border-radius:24px;
        padding:18px 14px 16px;
      }

      .block{
        border-radius:20px;
        padding:16px 10px 12px;
      }

      .btn{
        width:78px;
        height:78px;
        font-size:40px;
      }

      .value{
        min-width:82px;
        font-size:68px;
      }

      .reset{
        height:64px;
        font-size:20px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">

      <div class="block">
        <div class="label">LIFE</div>
        <div class="row">
          <button class="btn" onclick="lifeMinus()">−</button>
          <div class="value" id="life">10</div>
          <button class="btn" onclick="lifePlus()">＋</button>
        </div>
        <div class="hint">範囲 0〜10</div>
      </div>

      <div class="block">
        <div class="label">DEPTH</div>
        <div class="row">
          <button class="btn" onclick="depthMinus()">−</button>
          <div class="value" id="depth">0</div>
          <button class="btn" onclick="depthPlus()">＋</button>
        </div>
        <div class="hint">範囲 0〜4</div>
      </div>

      <button class="reset" onclick="reset()">RESET</button>

    </div>
  </div>

  <script>
    let life = Number(localStorage.getItem("kaiyouki_life") ?? 10)
    let depth = Number(localStorage.getItem("kaiyouki_depth") ?? 0)

    function clamp(value, min, max){
      return Math.min(max, Math.max(min, value))
    }

    function update(){
      document.getElementById("life").innerText = life
      document.getElementById("depth").innerText = depth
      localStorage.setItem("kaiyouki_life", life)
      localStorage.setItem("kaiyouki_depth", depth)
    }

    function lifePlus(){
      life = clamp(life + 1, 0, 10)
      update()
    }

    function lifeMinus(){
      life = clamp(life - 1, 0, 10)
      update()
    }

    function depthPlus(){
      depth = clamp(depth + 1, 0, 4)
      update()
    }

    function depthMinus(){
      depth = clamp(depth - 1, 0, 4)
      update()
    }

    function reset(){
      life = 10
      depth = 0
      update()
    }

    update()
  </script>
</body>
</html>
