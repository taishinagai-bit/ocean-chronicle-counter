<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ocean Chronicle Counter</title>

<style>

body{
background:linear-gradient(#031018,#061c2b);
color:white;
font-family:system-ui;
text-align:center;
padding-top:60px;
}

h1{
letter-spacing:4px;
font-size:28px;
margin-bottom:40px;
}

.panel{
background:#0b2536;
border-radius:20px;
padding:30px;
width:300px;
margin:auto;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.counter{
margin:30px 0;
}

.label{
font-size:14px;
opacity:0.7;
letter-spacing:2px;
}

.value{
font-size:60px;
margin:15px;
}

button{
font-size:24px;
width:60px;
height:50px;
border:none;
border-radius:10px;
background:#1b4e6a;
color:white;
margin:5px;
}

button:active{
transform:scale(0.95);
}

.reset{
margin-top:20px;
width:120px;
height:45px;
background:#805d1c;
}

</style>

</head>

<body>

<h1>OCEAN CHRONICLE</h1>

<div class="panel">

<div class="counter">

<div class="label">LIFE</div>

<button onclick="lifeMinus()">−</button>

<span class="value" id="life">10</span>

<button onclick="lifePlus()">＋</button>

</div>

<div class="counter">

<div class="label">DEPTH</div>

<button onclick="depthMinus()">−</button>

<span class="value" id="depth">0</span>

<button onclick="depthPlus()">＋</button>

</div>

<button class="reset" onclick="reset()">RESET</button>

</div>

<script>

let life = 10
let depth = 0

function update(){
document.getElementById("life").innerText = life
document.getElementById("depth").innerText = depth
}

function lifePlus(){
if(life < 10){
life++
update()
}
}

function lifeMinus(){
if(life > 0){
life--
update()
}
}

function depthPlus(){
if(depth < 4){
depth++
update()
}
}

function depthMinus(){
if(depth > 0){
depth--
update()
}
}

function reset(){
life = 10
depth = 0
update()
}

update()

</script>

</body>
</html>
