<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>海洋記 Counter</title>

  <style>
    :root{
      --bg0:#020b12;
      --bg1:#041a2a;
      --bg2:#021018;
      --aqua:rgba(0,180,255,.25);
      --aqua2:rgba(0,120,200,.16);
      --panel:rgba(9, 33, 52, .82);
      --panel2:rgba(9, 33, 52, .62);
      --line:rgba(255,255,255,.12);
      --text:#eaf4ff;
      --muted:rgba(234,244,255,.70);
      --btn:#1b4e6a;
      --btn2:#216589;
      --gold:#b79034;
      --gold2:#7a5a18;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at 50% 0%, var(--aqua), transparent 60%),
        radial-gradient(circle at 20% 80%, var(--aqua2), transparent 60%),
        linear-gradient(var(--bg0), var(--bg1) 60%, var(--bg2));
      overflow:hidden;
    }

    /* sea light rays */
    .rays{
      position:fixed; inset:-45vh -20vw auto -20vw;
      height:90vh;
      background: conic-gradient(from 180deg,
        rgba(0,180,255,.18),
        transparent 18%,
        rgba(0,140,220,.10),
        transparent 52%,
        rgba(255,210,120,.10),
        transparent 70%,
        rgba(0,180,255,.12)
      );
      filter: blur(18px);
      opacity:.55;
      transform: rotate(-12deg);
      pointer-events:none;
    }

    /* subtle bubbles */
    .bubbles{
      position:fixed; inset:0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.08) 0 1px, transparent 2px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.07) 0 1px, transparent 2px);
      background-size: 220px 220px, 260px 260px, 300px 300px;
      opacity:.35;
      pointer-events:none;
      animation: drift 18s linear infinite;
    }
    @keyframes drift{
      0%{ transform: translateY(0); }
      100%{ transform: translateY(-80px); }
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
    }

    .app{
      width:min(520px, 100%);
      border-radius:26px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
      overflow:hidden;
    }

    .header{
      padding:22px 18px 16px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(800px 260px at 50% 0%, rgba(0,180,255,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), transparent);
    }

    /* “orb” sigil (CSS only) */
    .orb{
      width:56px; height:56px;
      margin: 0 auto 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 35% 30%, rgba(180,245,255,.95), rgba(0,180,255,.35) 40%, rgba(0,0,0,.0) 68%),
        radial-gradient(circle at 70% 70%, rgba(255,220,140,.35), transparent 60%),
        rgba(255,255,255,.06);
      box-shadow: 0 14px 40px rgba(0,0,0,.45), 0 0 30px rgba(0,180,255,.18);
      position:relative;
    }
    .orb:before{
      content:"";
      position:absolute; inset:10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.25), transparent 55%);
    }

    .title{
      font-size:44px;
      letter-spacing:8px;
      font-weight:900;
      background: linear-gradient(#9be7ff, #ffffff, #6bd6ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow: 0 0 12px rgba(0,200,255,.45), 0 0 34px rgba(0,150,255,.26);
      margin:0;
    }
    .sub{
      margin-top:10px;
      font-size:12px;
      letter-spacing:.10em;
      color: var(--muted);
    }

    .panel{
      margin:18px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .panel:before{
      content:"";
      position:absolute; inset:auto -35% -10% -35%;
      height:140%;
      background: radial-gradient(closest-side, rgba(0,180,255,.10), transparent 70%);
      transform: rotate(-10deg);
      opacity:.7;
      pointer-events:none;
    }

    .block{
      padding:14px 10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.14);
      margin-bottom:14px;
      position:relative;
    }

    .label{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: rgba(234,244,255,.70);
      margin-bottom:12px;
      text-align:center;
      font-weight:800;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .value{
      min-width:86px;
      text-align:center;
      font-size:64px;
      font-weight:900;
      letter-spacing:.02em;
      text-shadow: 0 14px 30px rgba(0,0,0,.45);
    }

    .btn{
      width:70px; height:62px;
      border:none;
      border-radius:16px;
      background: linear-gradient(180deg, var(--btn2), var(--btn));
      color: white;
      font-size:34px;
      font-weight:900;
      box-shadow: 0 12px 26px rgba(0,0,0,.35);
    }
    .btn:active{ transform: scale(.98); }

    .hint{
      margin-top:10px;
      font-size:12px;
      letter-spacing:.08em;
      color: rgba(234,244,255,.50);
      text-align:center;
    }

    .footer{
      display:flex;
      gap:12px;
      padding: 0 18px 20px;
    }

    .reset{
      flex:1;
      height:52px;
      border:none;
      border-radius:16px;
      background: linear-gradient(180deg, rgba(215,170,70,.92), rgba(122,90,24,.92));
      color: #fff;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      box-shadow: 0 14px 34px rgba(0,0,0,.45);
    }
    .reset:active{ transform: scale(.99); }

    .tiny{
      padding: 0 18px 18px;
      font-size:11px;
      color: rgba(234,244,255,.45);
      text-align:center;
      letter-spacing:.04em;
    }

    @media (max-width: 380px){
      .title{ font-size:40px; letter-spacing:7px; }
      .value{ font-size:58px; min-width:78px; }
      .btn{ width:66px; height:58px; }
    }
  </style>
</head>

<body>
  <div class="rays" aria-hidden="true"></div>
  <div class="bubbles" aria-hidden="true"></div>

  <div class="wrap">
    <div class="app">
      <div class="header">
        <div class="orb" aria-hidden="true"></div>
        <h1 class="title">海洋記</h1>
        <div class="sub">Life / Depth Counter • Offline (after install)</div>
      </div>

      <div class="panel">
        <div class="block">
          <div class="label">LIFE</div>
          <div class="row">
            <button class="btn" id="lifeMinus" aria-label="Life minus">−</button>
            <div class="value" id="lifeVal">10</div>
            <button class="btn" id="lifePlus" aria-label="Life plus">＋</button>
          </div>
          <div class="hint">range 0–10</div>
        </div>

        <div class="block" style="margin-bottom:0;">
          <div class="label">DEPTH</div>
          <div class="row">
            <button class="btn" id="depthMinus" aria-label="Depth minus">−</button>
            <div class="value" id="depthVal">0</div>
            <button class="btn" id="depthPlus" aria-label="Depth plus">＋</button>
          </div>
          <div class="hint">range 0–4</div>
        </div>
      </div>

      <div class="footer">
        <button class="reset" id="resetBtn">RESET</button>
      </div>

      <div class="tiny">Tip: Add to Home Screen for offline use.</div>
    </div>
  </div>

  <script>
    // State (saved on device)
    const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));
    const load = (k, d) => {
      const v = Number(localStorage.getItem(k));
      return Number.isFinite(v) ? v : d;
    };
    const save = (k, v) => localStorage.setItem(k, String(v));

    let life  = load("kaiyouki_life", 10);
    let depth = load("kaiyouki_depth", 0);

    const lifeEl = document.getElementById("lifeVal");
    const depthEl = document.getElementById("depthVal");

    function render(){
      lifeEl.textContent = life;
      depthEl.textContent = depth;
      save("kaiyouki_life", life);
      save("kaiyouki_depth", depth);
    }

    document.getElementById("lifeMinus").onclick  = () => { life  = clamp(life - 1, 0, 10); render(); };
    document.getElementById("lifePlus").onclick   = () => { life  = clamp(life + 1, 0, 10); render(); };
    document.getElementById("depthMinus").onclick = () => { depth = clamp(depth - 1, 0, 4);  render(); };
    document.getElementById("depthPlus").onclick  = () => { depth = clamp(depth + 1, 0, 4);  render(); };

    document.getElementById("resetBtn").onclick = () => {
      life = 10; depth = 0; render();
    };

    render();
  </script>
</body>
</html>
