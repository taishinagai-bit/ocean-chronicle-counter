<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ocean Chronicle Counter</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#061018">

  <style>
    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      min-height:100%;
    }

    :root{
      --bg-url: url("bg-siren.PNG");
      --bg-pos-y: 18px;
      --bg-overlay-top: rgba(0,0,0,.10);
      --bg-overlay-bottom: rgba(0,0,0,.22);
    }

    body{
      color:white;
      font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
      text-align:center;
      background:
        linear-gradient(var(--bg-overlay-top), var(--bg-overlay-bottom)),
        var(--bg-url) center var(--bg-pos-y) / cover no-repeat fixed;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:
        calc(228px + env(safe-area-inset-top)) 16px
        calc(26px + env(safe-area-inset-bottom));
    }

    .panel{
      width:min(92vw, 420px);
      padding:0;
      background:transparent;
      border:none;
      box-shadow:none;
      position:relative;
    }

    .bgToggle{
      position:absolute;
      right:0;
      top:-50px;
      height:38px;
      padding:0 14px;
      border:none;
      border-radius:999px;
      background:rgba(3,16,27,.34);
      border:1px solid rgba(190,230,255,.12);
      color:rgba(255,255,255,.94);
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      backdrop-filter:blur(4px);
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    .bgToggle:active{
      transform:scale(.99);
    }

    .block{
      background:rgba(3,16,27,.28);
      border:1px solid rgba(190,230,255,.12);
      border-radius:26px;
      padding:16px 14px 12px;
      margin-bottom:14px;
      backdrop-filter:blur(4px);
      box-shadow:
        0 10px 24px rgba(0,0,0,.16);
    }

    .label{
      font-size:12px;
      letter-spacing:.24em;
      font-weight:700;
      color:rgba(255,255,255,.94);
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
    }

    .value{
      min-width:88px;
      font-size:70px;
      font-weight:800;
      line-height:1;
      color:#f4fbff;
      text-shadow:0 8px 22px rgba(0,0,0,.30);
    }

    .btn{
      width:82px;
      height:82px;
      border:none;
      border-radius:20px;
      font-size:42px;
      font-weight:700;
      color:#eef9ff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 24%),
        linear-gradient(180deg, #6d96bd 0%, #467aa7 42%, #2c5f87 100%);
      box-shadow:
        0 10px 20px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .btn:active{
      transform:scale(.98);
      box-shadow:
        0 7px 14px rgba(0,0,0,.16),
        inset 0 2px 6px rgba(0,0,0,.14);
    }

    .hint{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.64);
      letter-spacing:.06em;
    }
